http {
    server {
        listen 80;
        listen 443 ssl http2;

        //ssl_certificate /etc/nginx/certs/cert.pem;
        //ssl_certificate_key /etc/nginx/certs/key.pem;

        // ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            return 301 https://$host$request_uri;
        }
    }
}

events {}