stream {
    upstream wsbackends {
        server host.docker.internal:8080;
        server host.docker.internal:2222;
        server host.docker.internal:3333;
        server host.docker.internal:4444;
        server host.docker.internal:5555;
    }

    server {
        listen 80;
        proxy_pass wsbackends;
    }
}

events {}